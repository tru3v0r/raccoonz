name: imdb
url: "https://www.imdb.com"
author: "Valentin Venom"
version: 0.0.1
comment: "The first raccoonz bin ever."

fetcher: playwright
parser: bs4


endpoints:


  movie:

    path: "/title/{id}/"

    fields:
      title:
        select:
          css:
            - "[data-testid='hero__primary-text']"
            - "h1 span"
            - "h1"

      year:
        select:
          css:
            - "h1 + ul[role='presentation'] li:first-child"
            - "ul[role='presentation']:nth-child(2) li:first-child"
        type: int

      content-rating:
        select:
          css:
            - "h1 + ul[role='presentation'] li:nth-child(2)"
            - "ul[role='presentation']:nth-child(2) li:nth-child(2)"

      length:
        select:
          css:
            - "[data-testid='title-techspec_runtime'] div span:nth-child(1)"
            - "h1 + ul[role='presentation'] li:nth-child(3)"
            - "ul[role='presentation']:nth-child(2) li:nth-child(3)"

      rating:
        note:
          select:
            css:
              - "[data-testid='hero-rating-bar__aggregate-rating__score'] span"
              - "[data-testid='rating-histogram'] div span svg+span"
          type: float
        votes:
          count:
            select:
              css:
                - "[data-testid='rating-histogram-vote-count']"
          chart:
            select:
              css:
                - "[data-testid^='rating-histogram-bar-']"
            extract:
              attr: aria-label
            filter: vote_by_star
        reviews:
          select:
            css:
              - "[data-testid='reviews-header'] h3 span:nth-child(2)"

      interests:
        select:
          css:
            - "[data-testid='genres'] a"
        type: list_text
      
      synopsis:
        select:
          css:
            - "[data-testid='plot-l']"
      
      director:
        select:
          css:
            - "[data-testid='title-pc-list']>li:nth-child(1)>div>ul[role='presentation']:nth-child(1)"
            - "[data-testid='title-pc-list']>li>span+div>ul[role='presentation']:nth-child(1)"
        type: list_text
      
      writers:
        select:
          css:
            - "[data-testid='title-pc-list']>li:nth-child(2)>div>ul[role='presentation'] a"
        type: list_text
      
      stars:
        select:
          css:
            - "[data-testid='title-pc-list']>li:nth-child(3)>div>ul[role='presentation']"
        type: list_text

      top_cast:
        count:
          select:
            css:
              - "[data-testid='title-cast'] [data-testid='title-cast-header'] h3 span:nth-child(2)"
              - "[data-testid='title-cast'] [data-testid='title-cast-header'] h3 span.ipc-title__subtext"
          type: text

        fields:
          actor:
            name:
              select:
                css:
                  - "a[data-testid='title-cast-item__actor']"
              type: text
            link:
              select:
                css:
                  - "a[data-testid='title-cast-item__actor']"
              extract:
                attr: href
              type: text
            id:
              select:
                css:
                  - "a[data-testid='title-cast-item__actor']"
              extract:
                attr: href
              filter: imdb_id
            role:
              select:
              - "ul[data-testid='cast-item-characters-list'] li"
            type: list_text

      storyline:
        select:
          css:
            - "[data-testid='storyline-plot-summary']"
        type: text


  full_credits:
    path: "/title/{id}/fullcredits/"
    mode: sections_map

    sections:
      container:
        select:
          - "section"

      name:
        select:
          - "h4"
          - "h3"
        type: text
        transform: slug

      entries:
        container:
          select:
            - "table tr"
            - "ul li"

        fields:
          person_name:
            select:
              - "a[href*='/name/nm']"
            type: text

          person_id:
            select:
              - "a[href*='/name/nm']"
            type: attr
            attr: "href"
            transform: imdb_name_id

          detail:
            select:
              - ".credit"
              - ".role"
              - "td:nth-child(2)"
            type: text
            optional: true


filters:

  imdb_id:
    regex: "^(https://www\\.imdb\\.com)?/(title|name)/(tt\\d+|nm\\d+)/"

  vote_by_star:
    regex: "^(\\d+)"
name: imdb
url: "https://www.imdb.com"
author:
  name: "trevor"
  website: "https://github.com/tru3v0r/"
version: 0.0.1
comment: "The first raccoonz bin ever."

fetcher: playwright
parser: bs4

fetch:
  scroll_to:
    _select:
      css: "[data-testid='storyline-plot-summary']"
  wait_ms: 1500


endpoints:


  movie:

    path: "/title/{id}/"

    fields:
      title:
        _select:
          css:
            - "[data-testid='hero__primary-text']"
            - "h1 span"
            - "h1"

      year:
        _select:
          css:
            - "h1 + ul[role='presentation'] li:first-child"
            - "ul[role='presentation']:nth-child(2) li:first-child"
        _type: int

      certificate:
        _select:
          css:
            - "h1 + ul[role='presentation'] li:nth-child(2)"
            - "ul[role='presentation']:nth-child(2) li:nth-child(2)"

      length:
        _select:
          css:
            - "[data-testid='title-techspec_runtime'] div span:nth-child(1)"
            - "h1 + ul[role='presentation'] li:nth-child(3)"
            - "ul[role='presentation']:nth-child(2) li:nth-child(3)"

      rating:
        note:
          _select:
            css:
              - "[data-testid='hero-parent'] div:nth-child(3) [data-testid='hero-rating-bar__aggregate-rating__score'] span:first-child"
              - "[data-testid='rating-histogram'] div span svg+span"
          _type: float
        votes:
          count:
            _select:
              css:
                - "[data-testid='rating-histogram-vote-count']"
          chart:
            _select:
              css:
                - "[data-testid^='rating-histogram-bar-']"
            _extract:
              attr: aria-label
            _filter: vote_by_star
        reviews:
          _select:
            css:
              - "[data-testid='reviews-header'] h3 span:nth-child(2)"

      interests:
        _select:
          css:
            - "[data-testid='interests'] div a"
        _type: list_text
      
      synopsis:
        _select:
          css:
            - "[data-testid='plot-l']"
      
      director:
        _select:
          css:
            - "[data-testid='hero-parent'] section p[data-testid='plot']+div [data-testid='title-pc-list']:first-child [data-testid='title-pc-principal-credit']:first-child div li"
        _type: list_text
      
      writers:
        _select:
          css:
            - "[data-testid='hero-parent'] section p[data-testid='plot']+div [data-testid='title-pc-list']:first-child [data-testid='title-pc-principal-credit']:nth-child(2) div li"
        _type: list_text
      
      stars:
        _select:
          css:
            - "[data-testid='hero-parent'] section p[data-testid='plot']+div [data-testid='title-pc-list']:first-child [data-testid='title-pc-principal-credit']:nth-child(3) div li"
        _type: list_text

      top_cast:
        count:
          _select:
            css:
              - "[data-testid='title-cast'] [data-testid='title-cast-header'] h3 span:nth-child(2)"
              - "[data-testid='title-cast'] [data-testid='title-cast-header'] h3 span.ipc-title__subtext"
          _type: text

        actors:
          _group:
            _select:
              css:
                - "[data-testid='title-cast'] [data-testid='title-cast-item']"
            fields:
              name:
                _select:
                  css:
                    - "a[data-testid='title-cast-item__actor']"
              id:
                _select:
                  css:
                    - "a[data-testid='title-cast-item__actor']"
                _extract:
                  attr: href
                _filter: _extract_id_from_link
              link:
                _select:
                  css:
                    - "a[data-testid='title-cast-item__actor']"
                _extract:
                  attr: href
                _filter: clean_link
              role:
                _select:
                  css:
                    - "ul[data-testid='cast-item-characters-list'] li"

      storyline:
        _select:
          css:
            - "[data-testid='storyline-plot-summary']"

      trivia:
        _select:
          css:
            - "[data-testid='didyouknow-trivia'] a + div"


  full_credits:
    path: "/title/{id}/fullcredits/"

    fields:
      credits:
        _map:
          _select:
            - "section"

          _key:
            _select:
              - "h4"
              - "h3"

          _value:
            _group:
              _select:
                - "table tr"
                - "ul li"

              fields:
                name:
                  _select:
                    - "a[href*='/name/nm']"

                link:
                  _select:
                    - "a[href*='/name/nm']"
                  _extract:
                    attr: href
                  _filter: clean_link

                id:
                  _select:
                    - "a[href*='/name/nm']"
                  _extract:
                    attr: href
                  _filter: _extract_id_from_link

                role:
                  _select:
                    - ".credit"
                    - ".role"
                    - "td:nth-child(2)"
                    

filters:

  _extract_id_from_link:
    regex: "^(?:https://www\\.imdb\\.com)?/(?:title|name)/((?:tt|nm)\\d+)/"

  clean_link:
    regex: "^([^?]+)"

  vote_by_star:
    regex: "^(\\d+)"